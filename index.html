<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>創業地圖 · 一個法律系學生的路線</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0e27;
    --bg2: #0f1436;
    --panel: #141b3d;
    --line: #2a3566;
    --text: #e8ecff;
    --dim: #8892b8;
    --amber: #fbbf24;
    --neon: #34d399;
    --cyan: #22d3ee;
    --pink: #f472b6;
    --purple: #a78bfa;
    --red: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: "Noto Sans TC", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background:
      radial-gradient(ellipse at top, #1a2255 0%, transparent 60%),
      radial-gradient(ellipse at bottom, #2a1b4e 0%, transparent 60%),
      var(--bg);
    position: relative;
  }

  /* Starfield */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, #fff, transparent),
      radial-gradient(1px 1px at 30% 70%, #fff, transparent),
      radial-gradient(2px 2px at 55% 15%, #fff, transparent),
      radial-gradient(1px 1px at 75% 50%, #fff, transparent),
      radial-gradient(1px 1px at 90% 85%, #fff, transparent),
      radial-gradient(1px 1px at 20% 90%, #a78bfa, transparent),
      radial-gradient(2px 2px at 85% 25%, #f472b6, transparent),
      radial-gradient(1px 1px at 45% 45%, #34d399, transparent),
      radial-gradient(1px 1px at 5% 55%, #22d3ee, transparent);
    opacity: 0.55;
    animation: twinkle 6s ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.35; } to { opacity: 0.65; } }

  /* Scanlines overlay */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255, 255, 255, 0.02) 0 2px,
      transparent 2px 4px
    );
    mix-blend-mode: overlay;
  }

  /* =============== 封面 =============== */
  .cover {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4vw;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .cover.hidden {
    opacity: 0;
    transform: scale(1.05);
    pointer-events: none;
  }
  .cover-tag {
    font-family: "Press Start 2P", monospace;
    font-size: clamp(10px, 1.2vw, 14px);
    color: var(--neon);
    letter-spacing: 0.3em;
    margin-bottom: 2em;
    animation: flicker 2s infinite;
  }
  @keyframes flicker {
    0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
    20%, 24%, 55% { opacity: 0.4; }
  }
  .cover h1 {
    font-size: clamp(36px, 7vw, 100px);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 0.4em;
    background: linear-gradient(135deg, #fff 0%, var(--cyan) 50%, var(--pink) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.02em;
  }
  .cover h2 {
    font-size: clamp(14px, 2vw, 22px);
    font-weight: 400;
    color: var(--dim);
    margin-bottom: 0.5em;
    letter-spacing: 0.15em;
  }
  .cover-speaker {
    margin-top: 3em;
    font-family: "JetBrains Mono", monospace;
    color: var(--amber);
    font-size: clamp(11px, 1.1vw, 13px);
    letter-spacing: 0.2em;
  }
  .cover-speaker span { color: var(--text); font-size: 1.3em; display: block; margin-top: 0.6em; letter-spacing: 0.05em; font-family: "Noto Sans TC"; font-weight: 700; }
  .start-btn {
    margin-top: 4em;
    padding: 1.2em 3em;
    background: transparent;
    border: 2px solid var(--neon);
    color: var(--neon);
    font-family: "Press Start 2P", monospace;
    font-size: clamp(11px, 1.2vw, 14px);
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .start-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--neon);
    transform: translateX(-101%);
    transition: transform 0.3s;
    z-index: -1;
  }
  .start-btn:hover { color: var(--bg); }
  .start-btn:hover::before { transform: translateX(0); }
  .start-hint {
    margin-top: 1.5em;
    color: var(--dim);
    font-size: 13px;
    letter-spacing: 0.1em;
  }

  /* =============== 主畫面 =============== */
  .app {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transition: opacity 0.8s ease 0.3s;
  }
  .app.visible { opacity: 1; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--line);
    background: rgba(10, 14, 39, 0.6);
    backdrop-filter: blur(10px);
  }
  .logo {
    font-family: "Press Start 2P", monospace;
    font-size: 13px;
    color: var(--neon);
    letter-spacing: 0.15em;
  }
  .progress {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
    color: var(--dim);
  }
  .progress-bar {
    width: 200px;
    height: 6px;
    background: var(--line);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--neon));
    width: 0%;
    transition: width 0.5s ease;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .restart-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--dim);
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    font-family: "JetBrains Mono", monospace;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }
  .restart-btn:hover { color: var(--text); border-color: var(--dim); }

  /* =============== 地圖 =============== */
  .map-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .map {
    position: absolute;
    inset: 0;
    padding: 5vh 5vw;
  }
  .map-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .node {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    transition: transform 0.2s;
    text-align: center;
    z-index: 5;
  }
  .node:hover { transform: translate(-50%, -50%) scale(1.08); z-index: 10; }

  .node-dot {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 10px;
    background: var(--panel);
    border: 2px solid var(--line);
    font-size: 28px;
    position: relative;
    transition: all 0.3s;
  }
  .node.locked .node-dot {
    opacity: 0.4;
    filter: grayscale(0.8);
  }
  .node.visited .node-dot {
    border-color: var(--cyan);
    background: rgba(34, 211, 238, 0.1);
    box-shadow: 0 0 20px rgba(34, 211, 238, 0.3);
  }
  .node.current .node-dot {
    border-color: var(--amber);
    background: rgba(251, 191, 36, 0.15);
    box-shadow: 0 0 30px rgba(251, 191, 36, 0.5);
    animation: pulseCurrent 2s infinite;
  }
  @keyframes pulseCurrent {
    0%, 100% { box-shadow: 0 0 30px rgba(251, 191, 36, 0.5); }
    50% { box-shadow: 0 0 50px rgba(251, 191, 36, 0.8); }
  }

  .node-num {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 22px;
    height: 22px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 50%;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dim);
  }
  .node.visited .node-num, .node.current .node-num {
    color: var(--text);
    border-color: var(--cyan);
  }

  .node-year {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--amber);
    letter-spacing: 0.1em;
    margin-bottom: 2px;
  }
  .node-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
  }
  .node-sub {
    font-size: 11px;
    color: var(--dim);
    margin-top: 2px;
  }
  .node.locked .node-title, .node.locked .node-sub, .node.locked .node-year {
    color: var(--dim);
    opacity: 0.6;
  }

  /* SVG path animation */
  .path-line {
    stroke: var(--line);
    stroke-width: 2;
    stroke-dasharray: 6 6;
    fill: none;
  }
  .path-line.active {
    stroke: var(--cyan);
    animation: dashflow 2s linear infinite;
  }
  @keyframes dashflow {
    to { stroke-dashoffset: -24; }
  }

  /* =============== 故事卡片 modal =============== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(5, 8, 25, 0.85);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 3vh 3vw;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .modal-backdrop.visible {
    display: flex;
    opacity: 1;
  }

  .modal {
    width: min(1100px, 100%);
    max-height: 90vh;
    background: var(--panel);
    border: 1px solid var(--cyan);
    box-shadow: 0 20px 80px rgba(34, 211, 238, 0.2), 0 0 40px rgba(34, 211, 238, 0.1) inset;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: scale(0.95);
    transition: transform 0.3s;
  }
  .modal-backdrop.visible .modal { transform: scale(1); }

  .modal-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(90deg, rgba(34, 211, 238, 0.08), transparent);
  }
  .modal-tag {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: var(--amber);
    letter-spacing: 0.15em;
  }
  .modal-tag .bullet {
    width: 8px; height: 8px;
    background: var(--amber);
    border-radius: 50%;
    animation: pulseCurrent 1.5s infinite;
  }
  .modal-close {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--dim);
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover { color: var(--red); border-color: var(--red); }

  .modal-body {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    overflow: auto;
    flex: 1;
  }
  @media (max-width: 900px) {
    .modal-body { grid-template-columns: 1fr; }
  }

  .story-panel {
    padding: 32px 36px;
    border-right: 1px solid var(--line);
  }
  .story-icon {
    font-size: 44px;
    margin-bottom: 12px;
  }
  .story-title {
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .story-subtitle {
    font-size: 15px;
    color: var(--dim);
    margin-bottom: 24px;
    font-weight: 400;
  }
  .story-text {
    font-size: 16px;
    line-height: 1.85;
    color: var(--text);
  }
  .story-text p { margin-bottom: 1em; }
  .story-text em {
    color: var(--pink);
    font-style: normal;
    font-weight: 700;
  }
  .story-text strong {
    color: var(--cyan);
    font-weight: 700;
  }

  .side-panel {
    padding: 32px 36px;
    background: linear-gradient(180deg, rgba(167, 139, 250, 0.05), transparent);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .side-card {
    background: rgba(10, 14, 39, 0.6);
    border: 1px solid var(--line);
    padding: 20px;
    position: relative;
  }
  .side-card.whatif {
    border-color: var(--pink);
  }
  .side-card.insight {
    border-color: var(--neon);
    background: linear-gradient(135deg, rgba(52, 211, 153, 0.08), rgba(52, 211, 153, 0.02));
  }
  .side-card-tag {
    position: absolute;
    top: -1px;
    left: -1px;
    padding: 4px 12px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--bg);
    font-weight: 700;
  }
  .side-card.whatif .side-card-tag { background: var(--pink); }
  .side-card.insight .side-card-tag { background: var(--neon); }

  .side-card-body {
    margin-top: 26px;
    font-size: 15px;
    line-height: 1.75;
    color: var(--text);
  }
  .side-card.insight .side-card-body {
    font-size: 17px;
    font-weight: 700;
    color: var(--neon);
    line-height: 1.6;
  }

  .vote-card {
    background: rgba(251, 191, 36, 0.08);
    border: 1px dashed var(--amber);
    padding: 16px 20px;
  }
  .vote-card-title {
    font-size: 11px;
    color: var(--amber);
    letter-spacing: 0.15em;
    font-family: "JetBrains Mono", monospace;
    margin-bottom: 8px;
  }
  .vote-card-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
  }

  .modal-footer {
    padding: 18px 28px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    background: rgba(10, 14, 39, 0.5);
  }
  .nav-btn {
    padding: 10px 22px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text);
    font-family: "Noto Sans TC";
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav-btn:hover:not(:disabled) {
    border-color: var(--cyan);
    color: var(--cyan);
  }
  .nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .nav-btn.primary {
    border-color: var(--neon);
    color: var(--neon);
    font-weight: 700;
  }
  .nav-btn.primary:hover {
    background: var(--neon);
    color: var(--bg);
  }
  .keyboard-hint {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.1em;
  }
  .keyboard-hint kbd {
    background: var(--line);
    border: 1px solid var(--dim);
    border-bottom-width: 2px;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: inherit;
    margin: 0 2px;
    color: var(--text);
  }

  /* =============== Ending =============== */
  .ending {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: radial-gradient(ellipse at center, #1a2255 0%, var(--bg) 70%);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 5vw;
    opacity: 0;
    transition: opacity 0.6s;
  }
  .ending.visible { display: flex; opacity: 1; }
  .ending-title {
    font-size: clamp(32px, 6vw, 72px);
    font-weight: 900;
    margin-bottom: 0.3em;
    background: linear-gradient(135deg, var(--amber), var(--pink), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .ending-subtitle {
    font-size: clamp(16px, 2vw, 22px);
    color: var(--dim);
    margin-bottom: 2em;
    letter-spacing: 0.1em;
  }
  .ending-quote {
    max-width: 700px;
    font-size: clamp(18px, 2.2vw, 26px);
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 2em;
  }
  .ending-quote strong {
    color: var(--neon);
  }
  .ending-question {
    margin-top: 2em;
    padding: 24px 32px;
    border: 2px dashed var(--amber);
    font-size: clamp(18px, 2.4vw, 28px);
    font-weight: 700;
    color: var(--amber);
  }
  .ending-restart {
    margin-top: 3em;
    padding: 1em 2.4em;
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--dim);
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ending-restart:hover { color: var(--text); border-color: var(--text); }

  @media (max-width: 700px) {
    .topbar { padding: 12px 16px; }
    .progress-bar { width: 120px; }
    .node-dot { width: 48px; height: 48px; font-size: 22px; }
    .node-title { font-size: 11px; }
    .node-sub { font-size: 10px; }
    .story-panel, .side-panel { padding: 20px; }
    .story-title { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="stars"></div>
<div class="scanlines"></div>

<!-- 封面 -->
<div class="cover" id="cover">
  <div class="cover-tag">▸ PRESS START</div>
  <h1>創業地圖</h1>
  <h2>一個法律系學生，走去哪了？</h2>
  <div class="cover-speaker">
    SPEAKER
    <span>洪頎茗 Jagger Hung · Spot 創辦人</span>
  </div>
  <button class="start-btn" id="startBtn">點我開始遊戲</button>
  <div class="start-hint">提示：點地圖上的每一站，都是一個決定</div>
</div>

<!-- 主畫面 -->
<div class="app" id="app">
  <div class="topbar">
    <div class="logo">◆ 創業地圖 v1.0</div>
    <div class="progress">
      <span id="progressText">0 / 8</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="topbar-right">
      <button class="restart-btn" id="restartBtn">重新開始</button>
    </div>
  </div>

  <div class="map-wrap">
    <div class="map" id="map">
      <svg class="map-svg" id="mapSvg" preserveAspectRatio="none"></svg>
      <!-- nodes rendered here by JS -->
    </div>
  </div>
</div>

<!-- 故事 modal -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-tag">
        <div class="bullet"></div>
        <span id="modalMeta">2012 · 嘉義</span>
      </div>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body">
      <div class="story-panel">
        <div class="story-icon" id="storyIcon">📍</div>
        <div class="story-title" id="storyTitle">標題</div>
        <div class="story-subtitle" id="storySubtitle">副標</div>
        <div class="story-text" id="storyText"></div>
      </div>
      <div class="side-panel">
        <div class="vote-card" id="voteCard">
          <div class="vote-card-title">▸ 先問學生</div>
          <div class="vote-card-text" id="voteText"></div>
        </div>
        <div class="side-card whatif">
          <div class="side-card-tag">另一條路 · WHAT IF</div>
          <div class="side-card-body" id="whatifText"></div>
        </div>
        <div class="side-card insight">
          <div class="side-card-tag">回頭看 · INSIGHT</div>
          <div class="side-card-body" id="insightText"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="nav-btn" id="prevBtn">← 上一站</button>
      <div class="keyboard-hint"><kbd>←</kbd> <kbd>→</kbd> 切換 · <kbd>Esc</kbd> 關閉</div>
      <button class="nav-btn primary" id="nextBtn">下一站 →</button>
    </div>
  </div>
</div>

<!-- 結局 -->
<div class="ending" id="ending">
  <div class="ending-title">謝謝你們聽到這裡</div>
  <div class="ending-subtitle">TO BE CONTINUED...</div>
  <div class="ending-quote">
    六年了。<br />
    我<strong>問心無愧</strong>可以說，我花了大量的時間在自己的公司上。<br /><br />
    每一條路都沒有對錯。<br />
    既然選了，就走下去。
  </div>
  <div class="ending-question">
    那你們呢？下一步要選哪邊？
  </div>
  <button class="ending-restart" id="endingRestart">重新遊玩</button>
</div>

<script>

// ========== 狀態 ==========
let currentIdx = -1;
let visited = new Set();

// ========== 元素 ==========
const cover = document.getElementById("cover");
const app = document.getElementById("app");
const map = document.getElementById("map");
const mapSvg = document.getElementById("mapSvg");
const modal = document.getElementById("modal");
const ending = document.getElementById("ending");

// ========== 渲染節點 ==========
function renderNodes() {
  // Clear (keep svg)
  [...map.querySelectorAll(".node")].forEach(n => n.remove());

  NODES.forEach((n, i) => {
    const el = document.createElement("div");
    el.className = "node";
    el.style.left = n.pos.x + "%";
    el.style.top = n.pos.y + "%";

    if (visited.has(i)) el.classList.add("visited");
    if (i === currentIdx) el.classList.add("current");

    el.innerHTML = `
      <div class="node-dot">
        ${n.icon}
        <div class="node-num">${i + 1}</div>
      </div>
      <div class="node-year">${n.year}</div>
      <div class="node-title">${n.title}</div>
      <div class="node-sub">${n.location}</div>
    `;
    el.addEventListener("click", () => openNode(i));
    map.appendChild(el);
  });

  renderPaths();
  updateProgress();
}

function renderPaths() {
  const rect = map.getBoundingClientRect();
  mapSvg.setAttribute("viewBox", `0 0 ${rect.width} ${rect.height}`);
  mapSvg.innerHTML = "";

  for (let i = 0; i < NODES.length - 1; i++) {
    const a = NODES[i].pos;
    const b = NODES[i + 1].pos;
    const x1 = (a.x / 100) * rect.width;
    const y1 = (a.y / 100) * rect.height;
    const x2 = (b.x / 100) * rect.width;
    const y2 = (b.y / 100) * rect.height;
    // Curved path
    const mx = (x1 + x2) / 2;
    const my = (y1 + y2) / 2 + (i % 2 === 0 ? -40 : 40);
    const d = `M ${x1} ${y1} Q ${mx} ${my} ${x2} ${y2}`;

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", d);
    path.setAttribute("class", "path-line" + (visited.has(i) && visited.has(i + 1) ? " active" : visited.has(i) ? " active" : ""));
    mapSvg.appendChild(path);
  }
}

function updateProgress() {
  const count = visited.size;
  document.getElementById("progressText").textContent = `${count} / ${NODES.length}`;
  document.getElementById("progressFill").style.width = `${(count / NODES.length) * 100}%`;
}

// ========== Modal ==========
function openNode(idx) {
  currentIdx = idx;
  visited.add(idx);
  const n = NODES[idx];

  document.getElementById("modalMeta").textContent = `${n.year} · ${n.location}`;
  document.getElementById("storyIcon").textContent = n.icon;
  document.getElementById("storyTitle").textContent = n.title;
  document.getElementById("storySubtitle").textContent = n.subtitle;
  document.getElementById("storyText").innerHTML = n.story;
  document.getElementById("whatifText").textContent = n.whatif;
  document.getElementById("insightText").textContent = n.insight;

  const voteCard = document.getElementById("voteCard");
  if (n.vote) {
    voteCard.style.display = "block";
    document.getElementById("voteText").textContent = n.vote;
  } else {
    voteCard.style.display = "none";
  }

  document.getElementById("prevBtn").disabled = idx === 0;
  const nextBtn = document.getElementById("nextBtn");
  if (idx === NODES.length - 1) {
    nextBtn.textContent = "看結局 →";
  } else {
    nextBtn.textContent = "下一站 →";
  }

  modal.classList.add("visible");
  renderNodes();
}

function closeModal() {
  modal.classList.remove("visible");
}

function nextNode() {
  if (currentIdx >= NODES.length - 1) {
    closeModal();
    showEnding();
    return;
  }
  openNode(currentIdx + 1);
}

function prevNode() {
  if (currentIdx > 0) openNode(currentIdx - 1);
}

function showEnding() {
  ending.classList.add("visible");
}

// ========== 事件 ==========
document.getElementById("startBtn").addEventListener("click", () => {
  cover.classList.add("hidden");
  app.classList.add("visible");
  setTimeout(() => {
    renderNodes();
    openNode(0);
  }, 400);
});

document.getElementById("modalClose").addEventListener("click", closeModal);
document.getElementById("nextBtn").addEventListener("click", nextNode);
document.getElementById("prevBtn").addEventListener("click", prevNode);
document.getElementById("restartBtn").addEventListener("click", () => location.reload());
document.getElementById("endingRestart").addEventListener("click", () => location.reload());

document.addEventListener("keydown", (e) => {
  if (!modal.classList.contains("visible")) return;
  if (e.key === "Escape") closeModal();
  if (e.key === "ArrowRight") nextNode();
  if (e.key === "ArrowLeft") prevNode();
});

// Re-render paths on resize
window.addEventListener("resize", () => {
  if (app.classList.contains("visible")) renderPaths();
});

// Initial render (hidden until start)
renderNodes();
</script>
